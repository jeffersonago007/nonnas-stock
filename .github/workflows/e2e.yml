name: E2E Smoke

on:
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'app/**'
      - 'identity/**'
      - 'catalog/**'
      - 'inventory-core/**'
      - 'recipes/**'
      - 'operations/**'
      - 'alerts/**'
      - 'reporting/**'
      - 'web-commons/**'
      - 'shared-kernel/**'
      - 'e2e/**'
      - '.github/workflows/e2e.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Playwright smoke (8 cenários)
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: nonnas_app
          POSTGRES_PASSWORD: nonnas_local
          POSTGRES_DB: nonnas
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nonnas_app"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/nonnas
      SPRING_DATASOURCE_USERNAME: nonnas_app
      SPRING_DATASOURCE_PASSWORD: nonnas_local
      NONNAS_ADMIN_EMAIL: admin@nonnas.com
      NONNAS_ADMIN_SENHA: AdminNonnas2026!
      NONNAS_JWT_SECRET: e2e-jwt-secret-precisa-ter-no-minimo-32-bytes-aqui
      NONNAS_CORS_ALLOWED_ORIGINS: http://localhost:5173

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Build backend (skip tests)
        run: ./mvnw -B -ntp -pl app -am package -DskipTests

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Playwright browsers
        run: ./mvnw -B -ntp -pl e2e exec:java -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install --with-deps chromium"

      - name: Start backend (background)
        run: |
          java -jar app/target/app.jar > backend.log 2>&1 &
          echo $! > backend.pid

      - name: Wait for backend health
        run: |
          for i in {1..40}; do
            if curl -fsS http://localhost:8080/actuator/health/readiness; then
              echo "Backend up"; exit 0
            fi
            sleep 3
          done
          echo "Backend nunca subiu"; cat backend.log; exit 1

      - name: Serve frontend (background)
        working-directory: frontend
        run: |
          npx vite preview --port 5173 --host 0.0.0.0 > ../frontend.log 2>&1 &
          echo $! > ../frontend.pid

      - name: Wait for frontend
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:5173/; then exit 0; fi
            sleep 2
          done
          echo "Frontend não subiu"; cat frontend.log; exit 1

      - name: Run E2E smoke
        run: ./mvnw -B -ntp -pl e2e test -Pe2e -De2e.headless=true

      - name: Upload Playwright screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-screenshots
          path: e2e/target/e2e-screenshots/
          retention-days: 14
          if-no-files-found: ignore

      - name: Tear down
        if: always()
        run: |
          [ -f backend.pid ] && kill $(cat backend.pid) || true
          [ -f frontend.pid ] && kill $(cat frontend.pid) || true
