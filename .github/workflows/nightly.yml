name: Nightly Quality Gates

on:
  schedule:
    - cron: '0 3 * * 5'   # 03:00 UTC sexta — PIT mutation testing
    - cron: '0 3 * * 6'   # 03:00 UTC sábado — Gatling load tests (placeholder T15)
  workflow_dispatch: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  pit-mutation:
    name: PIT Mutation Testing
    # Sexta-feira (cron 0 3 * * 5) ou disparo manual.
    # Master doc 7.5: "executado em workflow nightly.yml na sexta-feira".
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 3 * * 5'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - run: chmod +x ./mvnw

      - name: Run PIT (profile nightly)
        run: ./mvnw -B -ntp -P nightly verify

      - name: Upload PIT reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pit-reports
          path: '**/target/pit-reports/'
          if-no-files-found: warn
          retention-days: 30

  load-tests:
    name: Gatling Load Tests (placeholder)
    # TODO T15 — quando load-tests/ existir, remover o `if: false` abaixo.
    # Master doc 7.6: "Gatling em projeto separado (load-tests/)".
    if: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - run: echo "Placeholder — Gatling será adicionado em T15"
