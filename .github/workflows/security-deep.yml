name: Security Deep Scan

on:
  schedule:
    # Domingos 03:00 UTC — fora de horário de pico, evita rate limit do NVD.
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  owasp-dependency-check:
    name: OWASP Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Cache OWASP NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ runner.os }}-v1
          restore-keys: |
            owasp-nvd-${{ runner.os }}-

      - name: Make mvnw executable
        run: chmod +x ./mvnw

      - name: Run dependency-check
        env:
          # Configure no GitHub Settings → Secrets como NVD_API_KEY pra
          # acelerar download da base CVE. Sem ela, plugin ainda funciona
          # via fallback mais lento.
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./mvnw -B -ntp org.owasp:dependency-check-maven:aggregate

      - name: Upload report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.*
          if-no-files-found: ignore
          retention-days: 30
