# Defaults compartilhados pelos perfis dev/test/prod.
# Profile ativo escolhido via SPRING_PROFILES_ACTIVE — em dev usamos `dev`.

spring:
  application:
    name: nonnas-stock
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

server:
  shutdown: graceful
  error:
    include-message: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
    prometheus:
      access: read_only
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

# Sentry (master doc 15.1 / T17). Sem DSN configurado, SDK opera em modo
# no-op — não falha o boot. Configure NONNAS_SENTRY_DSN em prod.
sentry:
  dsn: ${NONNAS_SENTRY_DSN:}
  environment: ${SPRING_PROFILES_ACTIVE:dev}
  release: ${NONNAS_RELEASE:dev}
  send-default-pii: false
  traces-sample-rate: 0.1
  enable-tracing: true
  in-app-includes: com.nonnas
  # Logback integration sobe via sentry-logback no classpath. Eventos
  # >= ERROR viram issues; INFO+ sobe como breadcrumb.
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

nonnas:
  security:
    jwt:
      secret: ${NONNAS_JWT_SECRET:change-me-in-prod-must-be-32-or-more-bytes-long-please}
      access-ttl: PT15M
      refresh-ttl: P7D
      issuer: nonnas-stock
    initial-admin-password: ${NONNAS_INITIAL_ADMIN_PASSWORD:AdminNonnas2026!}
  operations:
    ajuste:
      threshold-aprovacao: 50
  cors:
    allowed-origins: ${NONNAS_CORS_ORIGINS:}
  rate-limit:
    enabled: true
    requests-per-minute: 100
  health:
    db-latency:
      threshold-ms: 200

logging:
  level:
    com.nonnas: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
