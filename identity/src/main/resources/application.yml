spring:
  application:
    name: nonnas-stock-identity
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

nonnas:
  security:
    jwt:
      secret: ${NONNAS_JWT_SECRET:change-me-in-prod-must-be-32-or-more-bytes-long-please}
      access-ttl: PT15M
      refresh-ttl: P7D
      issuer: nonnas-stock
    initial-admin-password: ${NONNAS_INITIAL_ADMIN_PASSWORD:AdminNonnas2026!}

logging:
  level:
    org.hibernate.SQL: WARN
    org.flywaydb: INFO
