spring:
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false
        temp:
          use_jdbc_metadata_defaults: false
  flyway:
    enabled: true
    clean-disabled: false

nonnas:
  security:
    jwt:
      secret: test-jwt-secret-must-be-at-least-32-bytes-long-aaaaaaa
      access-ttl: PT15M
      refresh-ttl: P7D
      issuer: nonnas-stock-test
    initial-admin-password: AdminNonnas2026!

logging:
  level:
    com.nonnas: INFO
    org.hibernate.SQL: WARN
    org.springframework: WARN
    io.zonky: INFO
